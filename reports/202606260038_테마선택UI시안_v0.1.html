<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>테마 선택 UI 시안 v0.1</title>
  <style>
    :root {
      --bg-base: #0f1117;
      --bg-panel: #1a1d27;
      --bg-panel-2: #141d2b;
      --text-primary: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #6366f1;
      --border: #2d3148;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .settings-theme-section {
      width: min(760px, calc(100vw - 48px));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      background: var(--bg-panel);
    }

    .settings-theme-section__header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .settings-theme-section__title {
      margin: 0;
      color: var(--text-primary);
      font-size: 18px;
      font-weight: 760;
      line-height: 1.3;
    }

    .settings-theme-section__description {
      margin: 6px 0 0;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .theme-choice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .theme-choice-card {
      min-height: 188px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      background: var(--bg-panel-2);
      color: var(--text-primary);
      text-align: left;
      cursor: pointer;
    }

    .theme-choice-card:hover {
      border-color: rgba(99, 102, 241, 0.72);
    }

    .theme-choice-card:focus-visible {
      outline: 0;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.28);
    }

    .theme-choice-card.is-active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--accent), 0 0 0 3px rgba(99, 102, 241, 0.18);
    }

    .theme-choice-card__top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .theme-choice-card__icon {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #101521;
      color: var(--text-primary);
      font-size: 18px;
    }

    .theme-choice-card__name {
      margin: 0;
      font-size: 15px;
      font-weight: 760;
    }

    .theme-choice-card__preview {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: #0f1117;
    }

    .theme-preview-bar {
      height: 28px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      padding: 0 10px;
    }

    .theme-preview-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #475569;
    }

    .theme-preview-body {
      display: grid;
      gap: 8px;
      padding: 12px;
    }

    .theme-preview-line {
      height: 8px;
      border-radius: 999px;
      background: #334155;
    }

    .theme-preview-line:nth-child(1) {
      width: 72%;
      background: var(--accent);
    }

    .theme-preview-line:nth-child(2) {
      width: 92%;
    }

    .theme-preview-line:nth-child(3) {
      width: 54%;
    }

    .theme-choice-card--light .theme-choice-card__preview {
      border-color: #cbd5e1;
      background: #f8fafc;
    }

    .theme-choice-card--light .theme-preview-bar {
      border-bottom-color: #cbd5e1;
      background: #e2e8f0;
    }

    .theme-choice-card--light .theme-preview-dot {
      background: #94a3b8;
    }

    .theme-choice-card--light .theme-preview-line {
      background: #cbd5e1;
    }

    .theme-choice-card--light .theme-preview-line:nth-child(1) {
      background: var(--accent);
    }

    .theme-choice-card__status {
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      justify-self: start;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0 10px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
    }

    .theme-choice-card.is-active .theme-choice-card__status {
      border-color: rgba(99, 102, 241, 0.55);
      background: rgba(99, 102, 241, 0.14);
      color: var(--text-primary);
    }

    .theme-choice-card__check {
      width: 16px;
      height: 16px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <section class="settings-theme-section" aria-labelledby="theme-section-title">
    <header class="settings-theme-section__header">
      <div>
        <h2 class="settings-theme-section__title" id="theme-section-title">테마</h2>
        <p class="settings-theme-section__description">AgiTeamBuilder Desktop의 화면 표시 모드를 선택합니다.</p>
      </div>
    </header>

    <div class="theme-choice-grid" role="radiogroup" aria-label="테마 선택">
      <button class="theme-choice-card is-active" type="button" role="radio" aria-checked="true">
        <div class="theme-choice-card__top">
          <span class="theme-choice-card__icon" aria-hidden="true">☾</span>
          <h3 class="theme-choice-card__name">어두운 테마</h3>
        </div>
        <div class="theme-choice-card__preview" aria-hidden="true">
          <div class="theme-preview-bar">
            <span class="theme-preview-dot"></span>
            <span class="theme-preview-dot"></span>
            <span class="theme-preview-dot"></span>
          </div>
          <div class="theme-preview-body">
            <span class="theme-preview-line"></span>
            <span class="theme-preview-line"></span>
            <span class="theme-preview-line"></span>
          </div>
        </div>
        <span class="theme-choice-card__status"><span class="theme-choice-card__check">✓</span> 현재 선택됨</span>
      </button>

      <button class="theme-choice-card theme-choice-card--light" type="button" role="radio" aria-checked="false">
        <div class="theme-choice-card__top">
          <span class="theme-choice-card__icon" aria-hidden="true">☼</span>
          <h3 class="theme-choice-card__name">밝은 테마</h3>
        </div>
        <div class="theme-choice-card__preview" aria-hidden="true">
          <div class="theme-preview-bar">
            <span class="theme-preview-dot"></span>
            <span class="theme-preview-dot"></span>
            <span class="theme-preview-dot"></span>
          </div>
          <div class="theme-preview-body">
            <span class="theme-preview-line"></span>
            <span class="theme-preview-line"></span>
            <span class="theme-preview-line"></span>
          </div>
        </div>
        <span class="theme-choice-card__status">선택 가능</span>
      </button>
    </div>
  </section>
</body>
</html>
